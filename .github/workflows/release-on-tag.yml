name: Release on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag version matches pyproject
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python - <<'PY'
import tomllib
from pathlib import Path

data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
print(data["project"]["version"])
PY
)
          echo "TAG_VERSION=${TAG_VERSION}"
          echo "PYPROJECT_VERSION=${PYPROJECT_VERSION}"
          if [ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]; then
            echo "ERROR: tag version (v${TAG_VERSION}) does not match pyproject version (${PYPROJECT_VERSION})."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GDLEX Anonimizzatore ${{ github.ref_name }}
          generate_release_notes: true
